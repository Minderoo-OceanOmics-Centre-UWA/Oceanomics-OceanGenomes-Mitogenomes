report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/oceangenomesmitogenomes/tree/dev" target="_blank">nf-core/oceangenomesmitogenomes</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://nf-co.re/oceangenomesmitogenomes/dev/docs/output" target="_blank">documentation</a>.
report_section_order:
  multiqc_software_versions:
    order: -1000
  "nf-core-oceangenomesmitogenomes-methods-description":
    order: -2000
  "nf-core-oceangenomesmitogenomes-summary":
    order: -3000
  "nf-core-oceangenomesmitogenomes-tool-parameters":
    order: -100000
  mitogenome_assembly_summary:
    order: 100
  upload_results_summary:
    order: 95
  ena_validation_results:
    order: 96

export_plots: true

disable_version_detection: true

# Render pipeline-specific results lacking native MultiQC modules (v1.30 schema)
custom_data:
  qc_summary:
    section_name: "QC Summary"
    description: "Per-sample QC summary (sample, species, proceed_qc, annotation_passed, missing_genes)."
    plot_type: table
    data_format: tsv
    filename_glob: "*.qc_summary.tsv"
    headers:
      sample: "Sample"
      species: "Species"
      proceed_qc: "Proceed QC"
      annotation_passed: "Annotation Passed"
      missing_genes: "Missing Genes"

  mitogenome_assembly_summary:
    section_name: "Mitogenome assembly summary"
    description: "Per-sample assembly QC metrics parsed from MitoHiFi and GetOrganelle outputs."
    plot_type: table
    data_format: tsv
    filename_glob: "mitogenome_assembly_summary_mqc.tsv"
    headers:
      assembly_prefix: "Assembly ID"
      sample_id: "Sample"
      assembler: "Assembler"
      status: "Status"
      final_length_bp: "Final length (bp)"
      circularised: "Circularised"
      num_candidate_contigs: "Candidate contigs"
      num_final_contigs: "Final contigs"
      num_genes: "Genes"
      missing_genes: "Missing genes"
      frameshift_flag: "Frameshift"
      mean_coverage: "Mean coverage"
      coverage_cv: "Coverage CV"
      reference_species: "Reference species"
      reference_accession: "Reference accession"
      numt_flag: "Possible NUMT"
      manual_review_reason: "Manual review reason"

  mitohifi_stats:
    section_name: "MitoHiFi Contig Stats"
    description: "Per-sample contig statistics from MitoHiFi."
    plot_type: table
    data_format: tsv
    filename_glob: "*.contigs_stats.tsv"

  species_validation_summary:
    section_name: "Species Validation (LCA Summary)"
    description: "Per-sample LCA summary generated during species validation."
    plot_type: table
    data_format: tsv
    filename_glob: "lca_results.*.tsv"

  annotation_stats:
    section_name: "EMMA Annotation Stats"
    description: "Summary statistics for annotations."
    plot_type: table
    data_format: csv
    filename_glob: "*.annotation_stats.csv"

  upload_results_summary:
    section_name: "SQL Upload Summary"
    description: "Per-sample status of each SQL upload step, including post-QC ENA validation capture."
    plot_type: table
    data_format: tsv
    filename_glob: "upload_results_summary_mqc.tsv"
    headers:
      assembly_prefix: "Assembly ID"
      og_id: "Sample"
      assembly: "Assembly"
      annotation: "Annotation"
      species_validation: "Species validation"
      lca_blast: "LCA / BLAST"
      lca_raw: "LCA raw"
      ena_validation: "ENA validation"

  ena_validation_results:
    section_name: "ENA submission readiness"
    description: "Combined table2asn, conversion/preflight, and Webin validation status for each assembly entering mitogenome QC."
    plot_type: table
    data_format: tsv
    filename_glob: "ena_validation_results_mqc.tsv"
    headers:
      assembly_prefix: "Assembly ID"
      og_id: "Sample"
      validation_mode: "Mode"
      ena_study: "ENA study"
      table2asn_status: "Table2ASN"
      conversion_status: "Conversion"
      preflight_status: "Preflight"
      webin_status: "Webin"
      webin_reason: "Webin reason"
      submission_ready: "Submission ready"
      validation_attempt: "Attempt"

  table2asn_gate:
    section_name: "Table2ASN submission gate"
    description: "Per-sample validator severity counts and ENA eligibility. ERROR, REJECT, and fatal discrepancy findings quarantine only the affected sample."
    plot_type: table
    data_format: tsv
    filename_glob: "*.table2asn_status.tsv"
    headers:
      sample: "Sample"
      status: "Status"
      reject_count: "Rejects"
      error_count: "Errors"
      warning_count: "Warnings"
      info_count: "Info"
      fatal_discrepancy_count: "Fatal discrepancies"
      nostop_count: "Missing stops"
      blocking_codes: "Blocking codes"
      warning_codes: "Warning codes"

  table2asn_findings:
    section_name: "Table2ASN findings"
    description: "Normalised table2asn validator findings and fatal discrepancy-report findings."
    plot_type: table
    data_format: tsv
    filename_glob: "*.table2asn_findings.tsv"

  ena_conversion_gate:
    section_name: "ENA flat-file conversion"
    description: "Per-sample GenBank-to-EMBL conversion and annotation-preservation status."
    plot_type: table
    data_format: tsv
    filename_glob: "*.ena_conversion_status.tsv"

  ena_preflight_gate:
    section_name: "ENA EMBL preflight"
    description: "Per-sample gzip and EMBL structure gate used before standalone Webin validation."
    plot_type: table
    data_format: tsv
    filename_glob: "*.ena_preflight_status.tsv"

  webin_validation_gate:
    section_name: "ENA Webin validation"
    description: "Per-sample Webin validation status. Only PASS records are submission-ready."
    plot_type: table
    data_format: tsv
    filename_glob: "*.webin_status.tsv"

custom_content:
  - id: table2asn_validation
    section_name: "Table2ASN Validation"
    description: "Validation output from NCBI table2asn (per-sample .val files)."
    format: raw
    file_glob: "*.val"

  - id: qc_decision
    section_name: "QC Decision"
    description: "QC proceed flags per sample."
    format: raw
    file_glob: "proceed_qc.txt"
  - id: mitohifi_stats
    section_name: "MitoHiFi Contig Stats"
    description: "Per-sample contig statistics from MitoHiFi."
    plot_type: table
    file_format: tsv
    files:
      - "*.contigs_stats.tsv"

  - id: table2asn_validation
    section_name: "Table2ASN Validation"
    description: "Validation output from NCBI table2asn (per-sample .val files)."
    plot_type: raw
    files:
      - "*.val"

  - id: species_validation_summary
    section_name: "Species Validation (LCA Summary)"
    description: "Per-sample LCA summary generated during species validation."
    plot_type: table
    file_format: tsv
    files:
      - "lca_results.*.tsv"

  - id: annotation_stats
    section_name: "EMMA Annotation Stats"
    description: "Summary statistics for annotations."
    plot_type: table
    file_format: csv
    files:
      - "*.annotation_stats.csv"

  - id: qc_decision
    section_name: "QC Decision"
    description: "QC proceed flags per sample."
    plot_type: raw
    files:
      - "proceed_qc.txt"
  - id: qc_summary
    section_name: "QC Summary"
    description: "Per-sample QC summary (sample, species, proceed flag)."
    plot_type: table
    file_format: tsv
    files:
      - "*.qc_summary.tsv"

  - id: upload_results_summary
    section_name: "SQL Upload Summary"
    description: "Per-sample status of each SQL upload step (assembly, annotation, species validation, LCA/BLAST, LCA raw)."
    plot_type: table
    file_format: tsv
    files:
      - "upload_results_summary_mqc.tsv"
