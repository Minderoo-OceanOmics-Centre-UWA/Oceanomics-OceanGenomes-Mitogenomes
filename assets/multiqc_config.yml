report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/oceangenomesmitogenomes/tree/dev" target="_blank">nf-core/oceangenomesmitogenomes</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://nf-co.re/oceangenomesmitogenomes/dev/docs/output" target="_blank">documentation</a>.
report_section_order:
  multiqc_software_versions:
    order: -1000
  "nf-core-oceangenomesmitogenomes-methods-description":
    order: -2000
  "nf-core-oceangenomesmitogenomes-summary":
    order: -3000
  "nf-core-oceangenomesmitogenomes-tool-parameters":
    order: -100000
  mitogenome_assembly_summary:
    order: 100
  upload_results_summary:
    order: 95
  ena_validation_results:
    order: 96

export_plots: true

disable_version_detection: true

# Render pipeline-specific results lacking native MultiQC modules (v1.30 schema)
custom_data:
  qc_summary:
    section_name: "QC Summary"
    description: "Per-sample QC summary (sample, species, proceed_qc, annotation_passed, missing_genes)."
    plot_type: table
    data_format: tsv
    filename_glob: "*.qc_summary.tsv"
    headers:
      sample:
        title: "Sample"
      species:
        title: "Species"
      proceed_qc:
        title: "Proceed QC"
      annotation_passed:
        title: "Annotation Passed"
      missing_genes:
        title: "Missing Genes"

  mitogenome_assembly_summary:
    section_name: "Mitogenome assembly summary"
    description: "Per-sample assembly QC metrics parsed from MitoHiFi and GetOrganelle outputs."
    plot_type: table
    data_format: tsv
    filename_glob: "mitogenome_assembly_summary_mqc.tsv"
    headers:
      assembly_prefix:
        title: "Assembly ID"
      sample_id:
        title: "Sample"
      assembler:
        title: "Assembler"
      status:
        title: "Status"
      final_length_bp:
        title: "Final length (bp)"
      circularised:
        title: "Circularised"
      num_candidate_contigs:
        title: "Candidate contigs"
      num_final_contigs:
        title: "Final contigs"
      num_genes:
        title: "Genes"
      missing_genes:
        title: "Missing genes"
      frameshift_flag:
        title: "Frameshift"
      mean_coverage:
        title: "Mean coverage"
      coverage_cv:
        title: "Coverage CV"
      reference_species:
        title: "Reference species"
      reference_accession:
        title: "Reference accession"
      numt_flag:
        title: "Possible NUMT"
      manual_review_reason:
        title: "Manual review reason"

  mitohifi_stats:
    section_name: "MitoHiFi Contig Stats"
    description: "Per-sample contig statistics from MitoHiFi."
    plot_type: table
    data_format: tsv
    filename_glob: "*.contigs_stats.tsv"

  species_validation_summary:
    section_name: "Species Validation (LCA Summary)"
    description: "Per-sample LCA summary generated during species validation."
    plot_type: table
    data_format: tsv
    filename_glob: "lca_results.*.tsv"

  annotation_stats:
    section_name: "EMMA Annotation Stats"
    description: "Summary statistics for annotations."
    plot_type: table
    data_format: csv
    filename_glob: "*.annotation_stats.csv"

  upload_results_summary:
    section_name: "SQL Upload Summary"
    description: "Per-sample status of each SQL upload step, including post-QC ENA validation capture."
    plot_type: table
    data_format: tsv
    filename_glob: "upload_results_summary_mqc.tsv"
    headers:
      assembly_prefix:
        title: "Assembly ID"
      og_id:
        title: "Sample"
      assembly:
        title: "Assembly"
      annotation:
        title: "Annotation"
      species_validation:
        title: "Species validation"
      lca_blast:
        title: "LCA / BLAST"
      lca_raw:
        title: "LCA raw"
      ena_validation:
        title: "ENA validation"

  ena_validation_results:
    section_name: "ENA submission readiness"
    description: "Combined table2asn, conversion/preflight, and Webin validation status for each assembly entering mitogenome QC."
    plot_type: table
    data_format: tsv
    filename_glob: "ena_validation_results_mqc.tsv"
    headers:
      assembly_prefix:
        title: "Assembly ID"
      og_id:
        title: "Sample"
      validation_mode:
        title: "Mode"
      ena_study:
        title: "ENA study"
      table2asn_status:
        title: "Table2ASN"
      conversion_status:
        title: "Conversion"
      preflight_status:
        title: "Preflight"
      webin_status:
        title: "Webin"
      webin_reason:
        title: "Webin reason"
      submission_ready:
        title: "Submission ready"
      validation_attempt:
        title: "Attempt"

  table2asn_gate:
    section_name: "Table2ASN submission gate"
    description: "Per-sample validator severity counts and ENA eligibility. ERROR, REJECT, and fatal discrepancy findings quarantine only the affected sample."
    plot_type: table
    data_format: tsv
    filename_glob: "*.table2asn_status.tsv"
    headers:
      sample:
        title: "Sample"
      status:
        title: "Status"
      reject_count:
        title: "Rejects"
      error_count:
        title: "Errors"
      warning_count:
        title: "Warnings"
      info_count:
        title: "Info"
      fatal_discrepancy_count:
        title: "Fatal discrepancies"
      nostop_count:
        title: "Missing stops"
      blocking_codes:
        title: "Blocking codes"
      warning_codes:
        title: "Warning codes"

  table2asn_findings:
    section_name: "Table2ASN findings"
    description: "Normalised table2asn validator findings and fatal discrepancy-report findings."
    plot_type: table
    data_format: tsv
    filename_glob: "*.table2asn_findings.tsv"

  ena_conversion_gate:
    section_name: "ENA flat-file conversion"
    description: "Per-sample GenBank-to-EMBL conversion and annotation-preservation status."
    plot_type: table
    data_format: tsv
    filename_glob: "*.ena_conversion_status.tsv"

  ena_preflight_gate:
    section_name: "ENA EMBL preflight"
    description: "Per-sample gzip and EMBL structure gate used before standalone Webin validation."
    plot_type: table
    data_format: tsv
    filename_glob: "*.ena_preflight_status.tsv"

  webin_validation_gate:
    section_name: "ENA Webin validation"
    description: "Per-sample Webin validation status. Only PASS records are submission-ready."
    plot_type: table
    data_format: tsv
    filename_glob: "*.webin_status.tsv"
