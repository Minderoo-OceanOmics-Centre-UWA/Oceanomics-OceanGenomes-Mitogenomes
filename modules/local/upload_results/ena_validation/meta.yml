name: push_ena_validation_results
description: Insert normalized ENA validation attempts into PostgreSQL without failing the batch.
keywords: [ena, webin, postgresql, upload]
input:
  - meta: { type: map, description: Sample metadata }
  - validation_record: { type: file, description: Normalized per-assembly ENA validation record }
  - config: { type: file, description: PostgreSQL configuration }
output:
  - upload: { type: file, description: Non-fatal SQL upload log, pattern: "*.ena_validation.upload.txt" }
  - tool_params: { type: file, description: MultiQC tool-parameter row }
  - versions: { type: file, description: Tool versions, pattern: "versions.yml" }
authors: ["Tyler Peirce"]
maintainers: ["Tyler Peirce"]
